<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Contact</title>
    <style>
        :root {
            --bg-main: #fcfcfd;
            --bg-card: #ffffff;
            --border-color: rgba(0, 0, 0, 0.06);
            --border-hover: rgba(99, 102, 241, 0.25);
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent-indigo: #4f46e5;
            --accent-indigo-light: #e0e7ff;
            --accent-emerald: #059669;
            --accent-emerald-light: #d1fae5;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 12px 34px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 20px 50px rgba(99, 102, 241, 0.06);
            --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: var(--font-body); 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            line-height: 1.625; 
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.03), transparent 600px),
                radial-gradient(circle at 0% 100%, rgba(5, 150, 105, 0.02), transparent 600px);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium Nav */
        nav { 
            position: sticky; 
            top: 0; 
            background-color: var(--glass-bg); 
            border-bottom: 1px solid var(--border-color); 
            padding: 14px 24px; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 20px; 
        }

        .nav-logo { 
            font-family: var(--font-display);
            font-weight: 800; 
            font-size: 1.25rem; 
            color: var(--text-primary); 
            text-decoration: none; 
            letter-spacing: -0.5px; 
        }

        .nav-logo span { 
            color: var(--accent-indigo); 
            font-weight: 400;
        }

        .nav-right-block { 
            display: flex; 
            align-items: center; 
            gap: 24px; 
        }

        .nav-links { 
            display: flex; 
            gap: 4px; 
            list-style: none; 
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 500; 
            font-size: 0.9rem; 
            padding: 8px 16px; 
            border-radius: 8px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background-color: rgba(0, 0, 0, 0.03);
        }

        .nav-links a.active { 
            color: var(--accent-indigo); 
            background-color: var(--accent-indigo-light);
            font-weight: 600;
        }

        /* Quota Trigger Pill */
        .quota-trigger-btn {
            background: none;
            border: none;
            font-family: var(--font-body);
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .nav-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            background-color: var(--accent-emerald-light);
            color: var(--accent-emerald);
            border: 1px solid rgba(5, 150, 105, 0.1);
            letter-spacing: -0.1px;
            transition: all 0.25s ease;
        }

        .nav-badge:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.1);
        }

        /* Container */
        .container { 
            max-width: 680px; 
            margin: 0 auto; 
            padding: 90px 24px 60px 24px; 
            text-align: center; 
        }

        .page-header {
            margin-bottom: 48px;
        }

        .page-header h1 { 
            font-family: var(--font-display);
            font-size: 2.75rem; 
            font-weight: 800; 
            letter-spacing: -1.2px; 
            margin-bottom: 16px; 
            color: var(--text-primary); 
            line-height: 1.15;
        }

        .page-header p { 
            font-size: 1.1rem; 
            color: var(--text-secondary); 
            max-width: 520px;
            margin: 0 auto;
        }

        /* Contact Cards */
        .contact-card { 
            background-color: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 28px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            text-align: left; 
            display: flex; 
            align-items: center; 
            gap: 24px; 
            text-decoration: none; 
            box-shadow: var(--shadow-sm); 
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .contact-card:hover { 
            transform: translateY(-4px); 
            border-color: var(--border-hover); 
            box-shadow: var(--shadow-md); 
        }

        .icon-box { 
            width: 56px; 
            height: 56px; 
            border-radius: 14px; 
            background-color: var(--accent-indigo-light); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            color: var(--accent-indigo); 
            transition: all 0.3s ease;
        }

        .contact-card:hover .icon-box {
            background-color: var(--accent-indigo);
            color: #ffffff;
        }

        .contact-details h3 { 
            font-family: var(--font-display);
            font-size: 1.15rem; 
            font-weight: 700; 
            color: var(--text-primary); 
            margin-bottom: 4px; 
            letter-spacing: -0.2px;
        }

        .contact-details p { 
            font-size: 0.95rem; 
            color: var(--accent-indigo); 
            font-weight: 600; 
            word-break: break-all; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-arrow {
            font-size: 0.85rem;
            transition: transform 0.25s ease;
        }

        .contact-card:hover .action-arrow {
            transform: translateX(4px);
        }

        /* Footer */
        footer { 
            text-align: center; 
            padding: 40px 24px; 
            border-top: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            margin-top: 100px; 
        }

        footer a { 
            color: var(--text-primary); 
            text-decoration: none; 
            font-weight: 600; 
            border-bottom: 1px dashed rgba(0,0,0,0.2);
            padding-bottom: 1px;
            transition: all 0.2s ease; 
        }

        footer a:hover { 
            color: var(--accent-indigo); 
            border-bottom-color: var(--accent-indigo);
        }

        /* Premium Modal Overlay Layout */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            padding: 36px;
            box-shadow: var(--shadow-lg);
            transform: scale(0.96) translateY(10px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: left;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .modal-status {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-open {
            background-color: var(--accent-emerald-light);
            color: var(--accent-emerald);
        }

        .status-closed {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .modal-close {
            background: none; border: none;
            font-size: 1.5rem; color: var(--text-secondary);
            cursor: pointer; padding: 4px; line-height: 1;
            transition: color 0.2s ease;
        }

        .modal-close:hover { color: var(--text-primary); }

        .modal-box h3 {
            font-family: var(--font-display);
            font-size: 1.4rem; font-weight: 800;
            color: var(--text-primary); margin-bottom: 12px;
