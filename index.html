<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Architecture</title>
    <style>
        :root {
            --bg-main: #fcfcfd;
            --bg-card: #ffffff;
            --border-subtle: #e2e8f0;
            --text-display: #0f172a;
            --text-muted: #64748b;
            --brand-indigo: #4f46e5;
            --brand-indigo-light: #e0e7ff;
            --glass-nav: rgba(252, 252, 253, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-display);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* 🧭 High-End Header Design */
        nav {
            position: sticky;
            top: 0;
            background-color: var(--glass-nav);
            border-bottom: 1px solid var(--border-subtle);
            padding: 24px 40px;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: "Times New Roman", Georgia, serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-display);
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav-logo span {
            color: var(--brand-indigo);
            font-weight: 400;
            margin-left: 4px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            position: relative;
            padding: 6px 0;
            transition: color 0.2s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-display);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--text-display);
            transform: scaleX(0);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-links a.active::after,
        .nav-links a:hover::after {
            transform: scaleX(1);
        }

        /* 🏛️ Editorial Hero Presentation Layout */
        .hero-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px 20px;
            text-align: center;
        }

        .hero-wrapper h1 {
            font-family: "Times New Roman", Georgia, serif;
            font-size: 3.75rem;
            font-weight: 400;
            line-height: 1.15;
            color: var(--text-display);
            max-width: 900px;
            margin: 0 auto 32px auto;
            letter-spacing: -0.5px;
        }

        .hero-wrapper p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
            font-weight: 400;
        }

        /* 🔒 Clickable Cohort Application Layout Block */
        .cohort-card {
            max-width: 850px;
            margin: 60px auto 40px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 60px 40px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.01);
            text-align: center;
            text-decoration: none;
            display: block;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cohort-card:hover {
            transform: translateY(-4px);
            border-color: var(--text-display);
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.04);
        }

        .status-pill {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--brand-indigo);
            background-color: var(--brand-indigo-light);
            border: 1px solid rgba(79, 70, 229, 0.1);
            padding: 6px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
        }

        .cohort-card h2 {
            font-family: "Times New Roman", Georgia, serif;
            font-size: 2.2rem;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--text-display);
        }

        .cohort-card p {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 🎞️ Horizontal Scroll Collection Runway */
        .publication-runway-section {
            max-width: 1200px;
            margin: 40px auto 80px auto;
            padding: 0 20px;
        }

        .section-meta-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 16px;
        }

        .section-meta-header h2 {
            font-family: "Times New Roman", Georgia, serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--text-display);
            letter-spacing: -0.3px;
        }

        .scroll-indicator-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .horizontal-scroll-runway {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 12px 4px 32px 4px;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .horizontal-scroll-runway::-webkit-scrollbar {
            height: 3px;
        }
        .horizontal-scroll-runway::-webkit-scrollbar-track {
            background: transparent;
        }
        .horizontal-scroll-runway::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 2px;
            transition: background 0.2s ease;
        }
        .horizontal-scroll-runway:hover::-webkit-scrollbar-thumb {
            background: var(--text-muted);
        }

        .scroll-item-card {
            flex: 0 0 340px;
            scroll-snap-align: start;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            padding: 32px 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scroll-item-card:hover {
            transform: translateY(-4px);
            border-color: var(--text-display);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.04);
        }

        .card-top-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-category-badge {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .card-lang-badge {
            font-size: 0.75rem;
            color: var(--brand-indigo);
            background-color: var(--brand-indigo-light);
            padding: 2px 8px;
            font-weight: 500;
        }

        .scroll-item-card h3 {
            font-family: "Times New Roman", Georgia, serif;
            font-size: 1.3rem;
            font-weight: 400;
            line-height: 1.3;
            color: var(--text-display);
            margin-bottom: 12px;
        }

        .scroll-item-card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .card-contributor-footer {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px dashed var(--border-subtle);
            padding-top: 14px;
            margin-top: auto;
        }

        /* 🏛️ Standard Institutional Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            border-top: 1px solid var(--border-subtle);
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 80px;
            background-color: var(--bg-card);
        }

        footer a {
            color: var(--brand-indigo);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
