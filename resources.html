<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Resources</title>
    <style>
        :root {
            --bg-main: #0b0f19; --bg-card: #131b2e; --border-color: #1e293b;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-emerald: #10b981; --accent-indigo: #6366f1; 
            --accent-glow: rgba(99, 102, 241, 0.15);
            --light-blue: rgba(16, 185, 129, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); color: var(--text-primary); line-height: 1.6; 
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.08), transparent 450px);
            background-attachment: fixed;
        }
        nav { position: sticky; top: 0; background-color: rgba(11, 15, 25, 0.85); border-bottom: 1px solid var(--border-color); padding: 18px 20px; z-index: 1000; backdrop-filter: blur(12px); }
        .nav-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .nav-logo { font-weight: 800; font-size: 1.3rem; color: #ffffff; text-decoration: none; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--accent-indigo); }
        .nav-right-block { display: flex; align-items: center; gap: 25px; }
        .nav-links { display: flex; gap: 8px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; padding: 8px 16px; border-radius: 8px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-links a.active, .nav-links a:hover { color: #ffffff; background-color: rgba(255, 255, 255, 0.05); }
        .nav-links a.active { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1); }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; color: #ffffff; letter-spacing: -0.5px; }
        p { color: var(--text-secondary); margin-bottom: 30px; font-size: 1.05rem; }
        
        .search-container { margin-bottom: 35px; }
        .search-bar { width: 100%; padding: 16px 22px; font-size: 1rem; color: #ffffff; border: 1px solid var(--border-color); border-radius: 12px; outline: none; background-color: rgba(11, 15, 25, 0.5); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .search-bar:focus { border-color: var(--accent-indigo); background-color: var(--bg-card); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        
        .resource-list { list-style: none; }
        
        /* Clickable Form Wrapper Link Elements */
        .resource-card { 
            display: block;
            background-color: var(--bg-card); 
            border: 1px solid var(--border-color); 
            padding: 26px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .resource-card:hover { transform: translateY(-4px); border-color: var(--accent-indigo); box-shadow: 0 12px 30px var(--accent-glow); }
        
        .resource-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .resource-link { font-weight: 700; color: #ffffff; font-size: 1.2rem; transition: color 0.2s ease; }
        .resource-card:hover .resource-link { color: var(--accent-indigo); text-decoration: underline; }
        .resource-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 12px; line-height: 1.6; }
        
        .badge { font-size: 0.75rem; font-weight: 700; padding: 6px 14px; border-radius: 20px; background-color: var(--light-blue); color: var(--accent-emerald); border: 1px solid rgba(16, 185, 129, 0.2); letter-spacing: 0.5px; }
        
        .uid-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .uid-token { font-family: monospace; font-size: 0.8rem; color: var(--text-secondary); background-color: rgba(11, 15, 25, 0.4); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-color); }
        .no-results { display: none; text-align: center; padding: 50px 20px; color: var(--text-secondary); font-style: italic; border: 1px dashed var(--border-color); border-radius: 16px; background-color: rgba(19, 27, 46, 0.2); }
        
        footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; margin-top: 80px; }
