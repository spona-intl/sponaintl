<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Resources</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-glass: rgba(255, 255, 255, 0.75);
            --bg-card: #ffffff;
            --border-color: rgba(148, 163, 184, 0.12);
            --border-hover: rgba(99, 102, 241, 0.25);
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent-indigo: #4f46e5;
            --accent-indigo-light: rgba(79, 70, 229, 0.08);
            --accent-emerald: #059669;
            --accent-emerald-light: rgba(5, 150, 105, 0.08);
            --shadow-sm: 0 4px 20px rgba(148, 163, 184, 0.05);
            --shadow-md: 0 16px 40px rgba(79, 70, 229, 0.06);
            --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-display);
            background-color: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.6;
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(79, 70, 229, 0.04), transparent 600px),
                radial-gradient(circle at 0% 100%, rgba(5, 150, 105, 0.03), transparent 600px);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* High-End Glassmorphic Navigation */
        nav {
            position: sticky;
            top: 0;
            background-color: var(--bg-glass);
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            z-index: 1000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-container {
            max-width: 1050px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-primary);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
        }

        .nav-logo span {
            color: var(--accent-indigo);
            font-weight: 400;
            margin-left: 2px;
        }

        .nav-right-block {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.88rem;
            padding: 10px 18px;
            border-radius: 12px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background-color: rgba(148, 163, 184, 0.08);
        }

        .nav-links a.active {
            color: var(--accent-indigo);
            background-color: var(--accent-indigo-light);
        }

        /* Main Container layout */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        h2 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Search Architecture */
        .search-container {
            margin-bottom: 40px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 18px 24px;
            font-size: 0.95rem;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            outline: none;
            background-color: var(--bg-card);
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .search-bar:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.08);
            transform: translateY(-1px);
        }

        .search-bar::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Resource Grid & Registry Cards */
        .resource-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .resource-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            color: inherit;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .resource-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .resource-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .resource-link {
            font-weight: 750;
            color: var(--text-primary);
            font-size: 1.25rem;
            letter-spacing: -0.3px;
            transition: color 0.2s ease;
        }

        .resource-card:hover .resource-link {
            color: var(--accent-indigo);
        }

        .badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            background-color: var(--accent-emerald-light);
            color: var(--accent-emerald);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .resource-card p {
            color: var(--text-secondary);
            font-size: 0.98rem;
            line-height: 1.6;
        }

        /* Token Layouts */
        .uid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            border-top: 1px solid rgba(148, 163, 184, 0.08);
            padding-top: 16px;
        }

        .uid-token {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            background-color: rgba(148, 163, 184, 0.06);
            padding: 5px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            letter-spacing: 0.2px;
        }

        .no-results {
            display: none;
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            border: 1px dashed var(--border-color);
            border-radius: 20px;
            background-color: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }

        /* Premium Minimalist Footer */
        footer {
            text-align: center;
            padding: 48px 24px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 100px;
            background-color: #ffffff;
        }

        footer a {
            color: var(--accent-indigo);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Google Translate Structural Overrides */
        #google_translate_element {
            display: inline-block;
        }
        .goog-te-gadget-simple {
            background-color: transparent !important;
            border: 1px solid var(--border-color) !important;
            padding: 6px 12px !important;
            border-radius: 10px !important;
            font-family: inherit !important;
            font-size: 0.82rem !important;
        }
    </style>
</head>
